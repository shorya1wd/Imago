<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Outer ring gradient: gold -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#E8960C"/>
    </linearGradient>
    <!-- Fill gradient: deep violet -->
    <radialGradient id="violet-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B2FA8"/>
      <stop offset="100%" stop-color="#2A1160"/>
    </radialGradient>
    <!-- Blade gradient: violet to gold -->
    <linearGradient id="blade-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3FCC"/>
      <stop offset="100%" stop-color="#F5C842"/>
    </linearGradient>
    <!-- Eye / pupil glow -->
    <radialGradient id="pupil-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="60%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#E8960C"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="47" stroke="url(#gold-grad)" stroke-width="3" fill="url(#violet-fill)"/>

  <!-- Aperture blades (6 rotated trapezoids) -->
  <g filter="url(#glow)">
    <!-- Blade 1: top -->
    <polygon points="50,12 43,30 57,30" fill="url(#blade-grad)" opacity="0.9"/>
    <!-- Blade 2: top-right -->
    <polygon points="82,27 66,38 72,50" fill="url(#blade-grad)" opacity="0.9" transform="rotate(60,50,50)"/>
    <!-- Blade 3: bottom-right -->
    <polygon points="82,27 66,38 72,50" fill="url(#blade-grad)" opacity="0.9" transform="rotate(120,50,50)"/>
    <!-- Blade 4: bottom -->
    <polygon points="50,12 43,30 57,30" fill="url(#blade-grad)" opacity="0.9" transform="rotate(180,50,50)"/>
    <!-- Blade 5: bottom-left -->
    <polygon points="82,27 66,38 72,50" fill="url(#blade-grad)" opacity="0.9" transform="rotate(240,50,50)"/>
    <!-- Blade 6: top-left -->
    <polygon points="82,27 66,38 72,50" fill="url(#blade-grad)" opacity="0.9" transform="rotate(300,50,50)"/>
  </g>

  <!-- Inner dark circle (lens well) -->
  <circle cx="50" cy="50" r="20" fill="#12062A" stroke="url(#gold-grad)" stroke-width="1.5"/>

  <!-- Eye shape (horizontal ellipse) -->
  <ellipse cx="50" cy="50" rx="14" ry="8" fill="none" stroke="url(#gold-grad)" stroke-width="1.5"/>
  <!-- Eye ends (lash points) -->
  <path d="M36,50 Q44,38 50,42 Q56,38 64,50" fill="none" stroke="#F5C842" stroke-width="1" opacity="0.6"/>
  <path d="M36,50 Q44,62 50,58 Q56,62 64,50" fill="none" stroke="#F5C842" stroke-width="1" opacity="0.6"/>

  <!-- Pupil -->
  <circle cx="50" cy="50" r="6" fill="url(#pupil-glow)"/>
  <!-- Inner pupil dark -->
  <circle cx="50" cy="50" r="3" fill="#0D0520"/>
  <!-- Catchlight -->
  <circle cx="52" cy="48" r="1" fill="white" opacity="0.8"/>
</svg>
