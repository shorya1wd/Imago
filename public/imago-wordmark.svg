<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#E8960C"/>
    </linearGradient>
    <radialGradient id="violet-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B2FA8"/>
      <stop offset="100%" stop-color="#2A1160"/>
    </radialGradient>
    <linearGradient id="blade-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3FCC"/>
      <stop offset="100%" stop-color="#F5C842"/>
    </linearGradient>
    <radialGradient id="pupil-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#E8960C"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ─── Icon (40×40 centered at x=40, y=40) ─── -->
  <g transform="translate(0,0)">
    <!-- Outer gold ring -->
    <circle cx="40" cy="40" r="36" stroke="url(#gold-grad)" stroke-width="2.5" fill="url(#violet-fill)"/>

    <!-- Aperture blades -->
    <g filter="url(#glow)" transform="translate(40,40)">
      <polygon points="0,-28 -5.5,-12 5.5,-12" fill="url(#blade-grad)" opacity="0.9"/>
      <polygon points="0,-28 -5.5,-12 5.5,-12" fill="url(#blade-grad)" opacity="0.9" transform="rotate(60)"/>
      <polygon points="0,-28 -5.5,-12 5.5,-12" fill="url(#blade-grad)" opacity="0.9" transform="rotate(120)"/>
      <polygon points="0,-28 -5.5,-12 5.5,-12" fill="url(#blade-grad)" opacity="0.9" transform="rotate(180)"/>
      <polygon points="0,-28 -5.5,-12 5.5,-12" fill="url(#blade-grad)" opacity="0.9" transform="rotate(240)"/>
      <polygon points="0,-28 -5.5,-12 5.5,-12" fill="url(#blade-grad)" opacity="0.9" transform="rotate(300)"/>
    </g>

    <!-- Lens well -->
    <circle cx="40" cy="40" r="16" fill="#12062A" stroke="url(#gold-grad)" stroke-width="1.2"/>

    <!-- Eye ellipse -->
    <ellipse cx="40" cy="40" rx="11" ry="6" fill="none" stroke="url(#gold-grad)" stroke-width="1.2"/>

    <!-- Pupil -->
    <circle cx="40" cy="40" r="4.5" fill="url(#pupil-glow)"/>
    <circle cx="40" cy="40" r="2.2" fill="#0D0520"/>
    <circle cx="41.5" cy="38.5" r="0.8" fill="white" opacity="0.85"/>
  </g>

  <!-- ─── IMAGO Text ─── -->
  <text
    x="94" y="50"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="32"
    letter-spacing="6"
    fill="url(#text-grad)"
    filter="url(#glow)"
  >IMAGO</text>

  <!-- ─── Media Studio subtext ─── -->
  <text
    x="96" y="65"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="500"
    font-size="9"
    letter-spacing="4"
    fill="#A78BCA"
    opacity="0.85"
  >MEDIA STUDIO</text>
</svg>
