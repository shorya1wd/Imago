<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Background dark gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>

    <!-- Gold gradient for blades -->
    <linearGradient id="goldBlade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE080"/>
      <stop offset="40%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#C8860A"/>
    </linearGradient>

    <!-- Purple iris fill -->
    <radialGradient id="irisFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6B35CC"/>
      <stop offset="100%" stop-color="#2A0E7A"/>
    </radialGradient>

    <!-- Gold iris ring gradient -->
    <radialGradient id="irisRing" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE080"/>
      <stop offset="70%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#C8860A"/>
    </radialGradient>

    <!-- Glow effect -->
    <filter id="bladeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="centerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="roundedSquare">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- ── Aperture blades (6 curved trapezoid blades, rotating clockwise) ── -->
  <!-- Each blade is a curved quadrilateral simulating a real aperture blade -->
  <g clip-path="url(#roundedSquare)" filter="url(#bladeGlow)">

    <!-- Blade 1 (top-right, 0°) -->
    <path d="M16,3 C18,3 21,5 22,8 C20,9 18,9.5 16,9 C14,8.5 12.5,7.5 12,6 Z"
          fill="url(#goldBlade)" opacity="0.95"/>
    <!-- Blade 2 (right, 60°) -->
    <path d="M16,3 C18,3 21,5 22,8 C20,9 18,9.5 16,9 C14,8.5 12.5,7.5 12,6 Z"
          fill="url(#goldBlade)" opacity="0.95" transform="rotate(60,16,16)"/>
    <!-- Blade 3 (bottom-right, 120°) -->
    <path d="M16,3 C18,3 21,5 22,8 C20,9 18,9.5 16,9 C14,8.5 12.5,7.5 12,6 Z"
          fill="url(#goldBlade)" opacity="0.95" transform="rotate(120,16,16)"/>
    <!-- Blade 4 (bottom-left, 180°) -->
    <path d="M16,3 C18,3 21,5 22,8 C20,9 18,9.5 16,9 C14,8.5 12.5,7.5 12,6 Z"
          fill="url(#goldBlade)" opacity="0.95" transform="rotate(180,16,16)"/>
    <!-- Blade 5 (left, 240°) -->
    <path d="M16,3 C18,3 21,5 22,8 C20,9 18,9.5 16,9 C14,8.5 12.5,7.5 12,6 Z"
          fill="url(#goldBlade)" opacity="0.95" transform="rotate(240,16,16)"/>
    <!-- Blade 6 (top-left, 300°) -->
    <path d="M16,3 C18,3 21,5 22,8 C20,9 18,9.5 16,9 C14,8.5 12.5,7.5 12,6 Z"
          fill="url(#goldBlade)" opacity="0.95" transform="rotate(300,16,16)"/>

    <!-- Blade separators (dark lines between blades for depth) -->
    <line x1="16" y1="3" x2="16" y2="9.5" stroke="#0a0a14" stroke-width="0.6" opacity="0.7"/>
    <line x1="16" y1="3" x2="16" y2="9.5" stroke="#0a0a14" stroke-width="0.6" opacity="0.7" transform="rotate(60,16,16)"/>
    <line x1="16" y1="3" x2="16" y2="9.5" stroke="#0a0a14" stroke-width="0.6" opacity="0.7" transform="rotate(120,16,16)"/>
    <line x1="16" y1="3" x2="16" y2="9.5" stroke="#0a0a14" stroke-width="0.6" opacity="0.7" transform="rotate(180,16,16)"/>
    <line x1="16" y1="3" x2="16" y2="9.5" stroke="#0a0a14" stroke-width="0.6" opacity="0.7" transform="rotate(240,16,16)"/>
    <line x1="16" y1="3" x2="16" y2="9.5" stroke="#0a0a14" stroke-width="0.6" opacity="0.7" transform="rotate(300,16,16)"/>
  </g>

  <!-- ── Purple iris (center circle) ── -->
  <circle cx="16" cy="16" r="7.8" fill="url(#irisFill)" filter="url(#centerGlow)"/>

  <!-- Gold iris ring -->
  <circle cx="16" cy="16" r="7.8" fill="none" stroke="url(#irisRing)" stroke-width="1.4"/>

  <!-- Inner dark pupil ring -->
  <circle cx="16" cy="16" r="4.2" fill="url(#bgGrad)"/>

  <!-- Pupil gold inner ring -->
  <circle cx="16" cy="16" r="4.2" fill="none" stroke="#F5C842" stroke-width="0.7" opacity="0.9"/>

  <!-- Dark pupil core -->
  <circle cx="16" cy="16" r="2.6" fill="#050510"/>

  <!-- Catchlight highlight (makes it look like an eye/lens) -->
  <circle cx="17.2" cy="14.8" r="0.8" fill="white" opacity="0.85"/>
  <circle cx="14.5" cy="17.2" r="0.4" fill="white" opacity="0.35"/>
</svg>
